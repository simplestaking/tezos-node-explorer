  <div class="table-wrapper font-12" fxLayout.gt-sm="row" fxLayout.lt-md="column">
    <div fxFlex.gt-sm="60%" fxFlex.lt-md="60%">
      <div class="row text-white-7">
        <span>ID</span>
        <span>PROPOSAL</span>
      </div>
      <cdk-virtual-scroll-viewport itemSize="32" class="state-table">
        <div *cdkVirtualFor="let proposal of stateMachine.proposals"
             (click)="selectProposal(proposal)"
             [class.active]="stateMachine.activeProposal === proposal"
             class="action row">
          <span class="text-white-7">{{ proposal.id }}</span>
          <span class="text-white">{{ proposal.type }}</span>
        </div>
      </cdk-virtual-scroll-viewport>

    <div fxFlex.gt-sm="40%"
         fxFlex.lt-md="40%"
         class="payload-view font-12 border-left d-flex flex-column">
      <div class="tabs padding-vertical-10">
        <span *ngFor="let tab of tabs"
              class="tab text-white-6 margin-left-10 pointer" [class.active]="tab === activeTab"
              (click)="activeTab = tab">
          {{ tab }}
        </span>
      </div>
      <div class="padding-left-10 padding-top-10 overflow-auto"

        <ng-container [ngSwitch]="activeTab">
          <div *ngSwitchCase="'STATE'">
            <pre>{{ stateMachine.state | json }}</pre>

          <div *ngSwitchCase="'ACTION'">

          </div>
          <div *ngSwitchCase="'DIFF'">
